name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install ruff
        run: pip install ruff>=0.1

      - name: Ruff check
        run: ruff check src/ tests/

      - name: Ruff format check
        run: ruff format --check src/ tests/

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -e ".[dev,typecheck,semantic,auth,metrics,prompts,encryption,migrations]"

      - name: mypy
        run: mypy src/stateloom/

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev,metrics,prompts,encryption,migrations]"

      - name: Run tests
        run: |
          pytest tests/ \
            --ignore=tests/test_production \
            --ignore=tests/test_e2e \
            --ignore=tests/test_store/test_postgres_store.py \
            --ignore=tests/test_cache/test_redis_cache_store.py \
            --ignore=tests/test_integration \
            -v --tb=short \
            --cov=stateloom --cov-report=xml --cov-report=term-missing --cov-fail-under=80

      - name: Upload coverage
        if: matrix.python-version == '3.13'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.xml

  test-production:
    name: Production Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -e ".[dev,metrics,prompts,encryption,migrations]"

      - name: Run production tests
        run: |
          pytest tests/test_production/ tests/test_e2e/ \
            -v --tb=short \
            --ignore-glob="**/test_postgres*" \
            --ignore-glob="**/test_redis*" \
            || true

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: stateloom_test
          POSTGRES_PASSWORD: stateloom_test
          POSTGRES_DB: stateloom_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U stateloom_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      STATELOOM_TEST_POSTGRES_URL: postgresql://stateloom_test:stateloom_test@localhost:5432/stateloom_test
      STATELOOM_TEST_REDIS_URL: redis://localhost:6379/0
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -e ".[dev,metrics,prompts,encryption,migrations,postgres,redis]"

      - name: Run integration tests
        run: |
          pytest \
            tests/test_store/test_postgres_store.py \
            tests/test_cache/test_redis_cache_store.py \
            -v --tb=short

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test, typecheck]
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Verify wheel installs
        run: |
          pip install dist/*.whl
          python -c "import stateloom; print(stateloom.__version__)"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
