<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 48" fill="none">
  <!-- Loom icon: connected nodes representing stateful sessions -->
  <g transform="translate(4, 4)">
    <!-- Threads / connections -->
    <line x1="8" y1="20" x2="20" y2="8" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>
    <line x1="8" y1="20" x2="20" y2="32" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>
    <line x1="20" y1="8" x2="36" y2="8" stroke="#818cf8" stroke-width="2" stroke-linecap="round"/>
    <line x1="20" y1="32" x2="36" y2="32" stroke="#818cf8" stroke-width="2" stroke-linecap="round"/>
    <line x1="20" y1="8" x2="36" y2="20" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="20" y1="32" x2="36" y2="20" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <!-- Nodes -->
    <circle cx="8" cy="20" r="4" fill="#6366f1"/>
    <circle cx="20" cy="8" r="3.5" fill="#818cf8"/>
    <circle cx="20" cy="32" r="3.5" fill="#818cf8"/>
    <circle cx="36" cy="8" r="3" fill="#a5b4fc"/>
    <circle cx="36" cy="20" r="3" fill="#a5b4fc"/>
    <circle cx="36" cy="32" r="3" fill="#a5b4fc"/>
  </g>
  <!-- Wordmark -->
  <text x="56" y="34" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-weight="800" font-size="28" letter-spacing="-0.03em" fill="#e4e4e7">State<tspan fill="#6366f1">Loom</tspan></text>
</svg>
